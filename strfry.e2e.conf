## Strfry config for E2E tests — minimal, ephemeral

db = "./strfry-db/"

dbParams {
    maxreaders = 256
    mapsize = 10995116277760
}

events {
    maxEventSize = 524288
    rejectEventsNewerThanSeconds = 900
    rejectEventsOlderThanSeconds = 94608000
    ephemeralEventsLifetimeSeconds = 300
    maxNumTags = 2000
    maxTagValSize = 4096
}

relay {
    bind = "0.0.0.0"
    port = 7777
    nofiles = 0

    info {
        name = "strfry-e2e"
        description = "E2E test relay"
    }

    maxWebsocketPayloadSize = 1048576
    autoPingSeconds = 55
    enableTcpKeepalive = false
    maxFilterLimit = 500
    maxSubsPerConnection = 20

    writePolicy {
        plugin = ""
    }

    compression {
        enabled = true
        slidingWindow = true
    }

    numThreads {
        ingester = 1
        reqWorker = 1
        reqMonitor = 1
        negentropy = 1
    }

    negentropy {
        enabled = true
        maxSyncEvents = 1000000
    }
}

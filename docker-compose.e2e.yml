services:
  strfry:
    image: dockurr/strfry:latest
    ports:
      - "7777:7777"
    tmpfs:
      - /app/strfry-db
    volumes:
      - ./strfry.e2e.conf:/etc/strfry.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7777"]
      interval: 2s
      timeout: 5s
      retries: 10

  blossom-mock:
    image: node:22-alpine
    ports:
      - "3001:3001"
    volumes:
      - ./scripts/blossom-mock.mjs:/app/blossom-mock.mjs:ro
    working_dir: /app
    command: node blossom-mock.mjs 3001
    environment:
      - BLOSSOM_MOCK_HOST=0.0.0.0
      - BLOSSOM_MOCK_PORT=3001
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/healthz"]
      interval: 2s
      timeout: 5s
      retries: 15
